<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockyMarket</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #eaeded; }
        header { background-color: #131921; color: white; padding-bottom: 10px; }
        .top-bar { display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; cursor: pointer; }
        .search-container { display: flex; padding: 0 15px; }
        input { flex: 1; height: 40px; border-radius: 4px 0 0 4px; border: none; padding-left: 10px; outline: none; }
        .search-btn { background: #febd69; border: none; width: 45px; border-radius: 0 4px 4px 0; cursor: pointer; font-size: 18px; }
        .nav-bar { display: flex; overflow-x: auto; padding: 10px 15px; background: #232f3e; margin-top: 10px; font-size: 13px; white-space: nowrap; }
        .nav-bar span { margin-right: 15px; cursor: pointer; transition: 0.3s; }
        .nav-bar span:hover { color: #febd69; }
        .loc-bar { background: #37475a; padding: 8px 15px; font-size: 12px; cursor: pointer; }
        .cart-container { position: relative; font-size: 25px; cursor: pointer; }
        #nb-articles { position: absolute; top: -5px; right: -5px; background: #f08804; color: black; border-radius: 50%; padding: 2px 6px; font-size: 12px; font-weight: bold; }
        .product-card { background: white; margin: 15px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-order { display: block; text-align: center; padding: 10px; margin-top: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="logo" onclick="location.reload()">RockyMarket.fr</div>
        <div style="display: flex; align-items: center;">
            <div style="margin-right: 15px; font-size: 12px; cursor: pointer;" onclick="alert('Page de connexion en cours de création...')">Se connecter ></div>
            <div class="cart-container" onclick="voirPanier()">
                <span id="nb-articles">0</span>🛒
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="moteur-recherche" placeholder="Rechercher RockyMarket.fr">
        <button class="search-btn" onclick="lancerRecherche()">🔍</button>
    </div>

    <div class="nav-bar">
        <span onclick="alert('Menu complet bientôt disponible')">☰ Toutes</span>
        <span onclick="alert('Nouveautés Haul')">Haul</span>
        <span onclick="alert('Top des ventes')">Meilleures ventes</span>
        <span onclick="alert('Rayon Basics')">Amazon Basics</span>
    </div>

    <div class="loc-bar" onclick="changerLocalisation()">
        📍 Votre adresse de livraison: <span id="ville">Congo, République ...</span>
    </div>
</header>

<main id="liste-produits">
    <div class="product-card">
        <h3>Article Exemple</h3>
        <p>Prix : 5.000 FCFA</p>
        <button onclick="ajouterAuPanier('Article Exemple')" style="width: 100%; padding: 10px; background: #ffd814; border: 1px solid #fcd200; border-radius: 5px; cursor: pointer;">Ajouter au panier</button>
        <a href="https://wa.me/243822178481?text=Je%20veux%20commander%20l'article" class="btn-order" style="background: #25D366; color: white;">Commander via WhatsApp</a>
    </div>
</main>

<script>
    let compteur = 0;

    // 1. Fonction pour le Panier
    function ajouterAuPanier(nom) {
        compteur++;
        document.getElementById('nb-articles').innerText = compteur;
        alert(nom + " ajouté au panier !");
    }

    function voirPanier() {
        alert("Vous avez " + compteur + " articles dans votre panier.");
    }

    // 2. Fonction pour la Recherche
    function lancerRecherche() {
        let texte = document.getElementById('moteur-recherche').value;
        if(texte == "") {
            alert("Veuillez taper quelque chose à rechercher.");
        } else {
            alert("Recherche de : " + texte);
        }
    }

    // 3. Fonction pour changer la localisation
    function changerLocalisation() {
        let nouvelleVille = prompt("Entrez votre ville :");
        if(nouvelleVille) {
            document.getElementById('ville').innerText = nouvelleVille;
        }
    }
</script>

</body>
</html>
