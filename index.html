<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockyMarket - 100 Articles & Images</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 80px; }
        header { background: #0047ab; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        #searchBar { width: 85%; padding: 12px; border-radius: 25px; border: none; margin-top: 10px; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        
        /* Style des cartes avec images */
        .card { background: white; border-radius: 12px; width: 165px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; background: #eee; }
        .card h3 { font-size: 0.9em; color: #333; margin: 10px 0; height: 35px; overflow: hidden; }
        .prix { color: #0047ab; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #007bff; color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; }

        /* Barrière avec les DEUX boutons */
        #barriere { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 400px; }
        .btn-modal { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-oui { background: #28a745; color: white; }
        .btn-quitter { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <div id="barriere">
        <div class="modal">
            <h2>Bonjour Madame, Monsieur</h2>
            <p>Souhaitez-vous entrer dans RockyMarket ?</p>
            <button class="btn-modal btn-oui" onclick="document.getElementById('barriere').style.display='none'">OUI</button>
            <button class="btn-modal btn-quitter" onclick="window.location.href='https://www.google.com'">QUITTÉ</button>
        </div>
    </div>

    <header>
        <h1>RockyMarket 🛒</h1>
        <input type="text" id="searchBar" onkeyup="rechercher()" placeholder="Rechercher parmi les 100 articles...">
    </header>

    <div class="container" id="listeArticles"></div>

    <script>
        const container = document.getElementById('listeArticles');
        // Liste d'images réelles de produits (Tech)
        const images = [
            "https://picsum.photos/id/1/200/200", // Laptop
            "https://picsum.photos/id/160/200/200", // Phone
            "https://picsum.photos/id/2/200/200", // Watch
            "https://picsum.photos/id/3/200/200"  // Tech gear
        ];

        for (let i = 1; i <= 100; i++) {
            let imgAleatoire = images[i % images.length]; // Alterne entre les images
            let prix = Math.floor(Math.random() * 800) + 100;

            container.innerHTML += `
                <div class="card">
                    <img src="${imgAleatoire}" alt="Produit">
                    <h3>Article Premium n°${i}</h3>
                    <p class="prix">${prix} €</p>
                    <button class="btn-add">Acheter</button>
                </div>
            `;
        }

        function rechercher() {
            let filter = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                let txt = card.innerText.toLowerCase();
                card.style.display = txt.includes(filter) ? "" : "none";
            }
        }
    </script>
</body>
</html>
