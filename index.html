<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockyMarket - Vente en ligne</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f3f3f3; }
        header { background-color: #232f3e; color: white; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #febd69; font-size: 24px; font-weight: bold; text-decoration: none; }
        
        /* Barre de recherche large */
        .search-container { display: flex; margin-top: 10px; width: 100%; }
        #search-input { flex: 1; height: 45px; padding: 0 15px; border: none; border-radius: 4px 0 0 4px; font-size: 16px; }
        .search-btn { width: 55px; height: 45px; background-color: #febd69; border: none; border-radius: 0 4px 4px 0; font-size: 20px; cursor: pointer; }

        .market-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-info h4 { margin: 5px 0; font-size: 14px; height: 35px; overflow: hidden; }
        .price { color: #B12704; font-size: 18px; font-weight: bold; margin: 5px 0; }
        
        .publish-btn { background-color: #ffa41c; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; position: fixed; bottom: 0; }
        .hidden { display: none; }
        .modal { background: white; padding: 20px; position: fixed; top: 20%; left: 5%; width: 90%; z-index: 200; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input[type="text"], input[type="number"] { width: 90%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="logo">RockyMarket</div>
        <div onclick="document.getElementById('publish-modal').classList.toggle('hidden')" style="font-size: 24px;">➕</div>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" oninput="rechercherArticle()" placeholder="Rechercher un produit ou un prix...">
        <button class="search-btn" onclick="rechercherArticle()">🔍</button>
    </div>
</header>

<div id="publish-modal" class="modal hidden">
    <h3>Publier un article</h3>
    <input type="file" id="post-image" accept="image/*">
    <input type="text" id="post-title" placeholder="Nom de l'article">
    <input type="number" id="post-price" placeholder="Prix en FCFA">
    <button onclick="publierArticle()" style="background: #232f3e; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px;">Publier Définitivement</button>
    <button onclick="document.getElementById('publish-modal').classList.add('hidden')" style="margin-top: 10px; background: none; border: none; color: red; width: 100%;">Annuler</button>
</div>

<div class="market-container" id="market-list">
    </div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    // TA CONFIGURATION (Remplace les ... par tes vrais codes)
    const firebaseConfig = {
        apiKey: "AIzaSyA47z9X0USyncaOeRKk46iS_T_T8", 
        authDomain: "rockymarket.firebaseapp.com",
        projectId: "rockymarket",
        storageBucket: "rockymarket.appspot.com",
        messagingSenderId: "471682542241",
        appId: "1:471682542241:web:f539491428f53949" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. RECHERCHE
    function rechercherArticle() {
        let text = document.getElementById('search-input').value.toLowerCase();
        let articles = document.querySelectorAll('.product-card');
        articles.forEach(art => {
            let nom = art.querySelector('h4').innerText.toLowerCase();
            let prix = art.querySelector('.price').innerText.toLowerCase();
            art.style.display = (nom.includes(text) || prix.includes(text)) ? "flex" : "none";
        });
    }

    // 2. PUBLIER DANS LE CLOUD
    function publierArticle() {
        const title = document.getElementById('post-title').value;
        const price = document.getElementById('post-price').value;
        const imgInput = document.getElementById('post-image');

        if(title && price && imgInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const articleData = {
                    nom: title,
                    prix: price,
                    image: e.target.result,
                    date: Date.now()
                };
                db.ref('articles').push(articleData).then(() => {
                    alert("Article enregistré dans le Cloud !");
                    document.getElementById('publish-modal').classList.add('hidden');
                });
            };
            reader.readAsDataURL(imgInput.files[0]);
        } else {
            alert("Remplissez tout, Patron !");
        }
    }

    // 3. CHARGER LES ARTICLES
    db.ref('articles').on('value', (snapshot) => {
        const list = document.getElementById('market-list');
        list.innerHTML = '';
        snapshot.forEach((child) => {
            const data = child.val();
            list.innerHTML += `
                <div class="product-card">
                    <img src="${data.image}">
                    <div class="product-info">
                        <h4>${data.nom}</h4>
                        <p class="price">${data.prix} FCFA</p>
                        <button onclick="window.location.href='https://wa.me/243822178481'" style="width:100%; background:#febd69; border:none; border-radius:4px; padding:5px;">Acheter</button>
                    </div>
                </div>`;
        });
    });
</script>

</body>
</html>
